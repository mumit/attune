[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aidedecamp"
version = "0.0.1"
description = "A self-learning workspace assistant over Gmail, Calendar, Google Chat, and Slack, running on Fuel iX."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Mumit" }]
keywords = ["assistant", "agent", "langgraph", "mem0", "fuelix", "workspace"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "bearer-openai>=0.1,<0.2",
    "python-dotenv>=1,<2",
    # Added as each phase comes online; kept minimal until then:
    # "slack-bolt>=1.20",
    # "google-api-python-client>=2",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "langgraph>=0.2"]
# Memory substrate. Kept optional so the package imports without it; install
# when standing up the Mem0 store. `[nlp]` adds BM25 + entity extraction.
memory = ["mem0ai>=0.1", "qdrant-client>=1.9"]
# Orchestration. Kept optional so the package imports without it; install when
# building/running graphs. Use a Postgres checkpointer in production.
orchestrator = ["langgraph>=0.2", "langgraph-checkpoint-sqlite>=2"]
# Slack channel (Socket Mode). Kept optional; install to run the Slack surface.
slack = ["slack-bolt>=1.24"]
# Direct-OAuth Google API access (DirectOAuthConnector) and the runtime's
# Pub/Sub pull loops (runtime.py). Kept optional; install when running without
# managed MCP servers, or to run the always-on process at all.
google = [
    "google-api-python-client>=2",
    "google-auth>=2",
    "google-auth-oauthlib>=1",
    "google-cloud-pubsub>=2",
]

[project.scripts]
aidedecamp = "aidedecamp.cli:main"

[project.urls]
Homepage = "https://github.com/telus-labs/aidedecamp"
Issues = "https://github.com/telus-labs/aidedecamp/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aidedecamp"]

[tool.hatch.metadata]
allow-direct-references = true
